---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  KONFLATE_URL: https://konflate.axis.scottmckendry.tech

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post diff on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { execSync } = require('child_process');
            const prNumber = context.issue.number;
            const konflateUrl = process.env.KONFLATE_URL;

            const summary = execSync(
              `curl -fsS --retry 10 --retry-delay 3 -H 'Accept: text/markdown' "${konflateUrl}/api/prs/${prNumber}/summary"`,
              { encoding: 'utf8', timeout: 60000 }
            );

            const konflateLink = `${konflateUrl}/#/pr/${prNumber}`;
            const body = `**[View diff in konflate →](${konflateLink})**\n\n${summary.trimEnd()}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const marker = 'View diff in konflate';
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
