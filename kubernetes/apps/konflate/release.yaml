---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
  namespace: konflate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: konflate
  values:
    config:
      repo: github://scottmckendry/axis
      clusterPath: ./kubernetes
      mergeCommand: gh pr merge {{ .Number }} --repo {{ .Repo }} --rebase --delete-branch
      closedPrMax: 1000
      closedPrTtl: "0"

    secret:
      existingSecret: konflate-webhook

    persistence:
      enabled: true
      storageClass: iscsi
      size: 20Gi

    ingress:
      enabled: false
