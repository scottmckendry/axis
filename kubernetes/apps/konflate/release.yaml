---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
  namespace: konflate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: konflate
    namespace: flux-system
  values:
    config:
      repo: github://scottmckendry/axis
      clusterPath: ./kubernetes
      refreshInterval: 30m
      logLevel: info
      logFormat: json
      mergeCommand: gh pr merge {{ .Number }} --repo {{ .Repo }} --rebase --delete-branch

    secret:
      existingSecret: konflate-webhook

    extraEnv:
      - name: KONFLATE_CACHE_DIR
        value: /tmp/konflate-cache

    ingress:
      enabled: false

    resources:
      limits:
        memory: 1Gi
      requests:
        cpu: 50m
        memory: 256Mi
