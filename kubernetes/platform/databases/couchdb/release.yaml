---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: couchdb
  namespace: databases
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      couchdb:
        containers:
          app:
            image:
              repository: couchdb
              tag: 3.5.2
            envFrom:
              - secretRef:
                  name: couchdb-secret
            securityContext:
              runAsUser: 5984
              runAsGroup: 5984
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_up
                    port: 5984
                  initialDelaySeconds: 20
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_up
                    port: 5984
                  initialDelaySeconds: 10
                  periodSeconds: 15
    defaultPodOptions:
      securityContext:
        fsGroup: 5984
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: couchdb
        ports:
          http:
            port: 5984
    persistence:
      data:
        existingClaim: couchdb-data
        globalMounts:
          - path: /opt/couchdb/data
      cors-config:
        type: configMap
        name: couchdb-cors
        globalMounts:
          - path: /opt/couchdb/etc/local.d/cors.ini
            subPath: cors.ini
            readOnly: true
